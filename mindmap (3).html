<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mind✦ryg</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* ── VARIABLES ── */
        :root {
          --bg: #0a0a0a;
          --surface: #111111;
          --card: #1c1c1c;
          --border: #272727;
          --border-light: #333333;
          --text: #efefef;
          --text-muted: #555555;
          --text-mid: #999999;
          --accent: #efefef;
          --flow: #ffffff;
          --flow-dim: rgba(255,255,255,0.07);
          --danger: #e05252;
          --radius: 14px;
          --radius-sm: 9px;
        }
        body[data-theme="light"] {
          --bg: #e2e0dc;
          --surface: #eceae6;
          --card: #ffffff;
          --border: #d0ceca;
          --border-light: #c0beba;
          --text: #141414;
          --text-muted: #9a9892;
          --text-mid: #4a4845;
          --accent: #141414;
          --flow: #141414;
          --flow-dim: rgba(0,0,0,0.07);
          --danger: #c94040;
        }
        body[data-theme="miku"] {
          --bg: #FFF0F7;
          --surface: #f2fcfb;
          --card: #ffffff;
          --border: #99D5D0;
          --border-light: #BCE8E4;
          --text: #1A2B2A;
          --text-muted: #007871;
          --text-mid: #005D57;
          --accent: #E3007F;
          --flow: #00C4B6;
          --flow-dim: rgba(0,196,182,0.15);
          --danger: #d04b4b;
        }

        /* ── GLOBAL LAYOUT ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ── TOOLBAR (bottom bar) ── */
        .toolbar {
            padding: 14px 24px;
            background-color: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 10;
            position: relative;
            transition: background-color 0.3s, border-color 0.3s, opacity 0.3s, transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        body.focus-mode .toolbar {
            opacity: 0;
            transform: translateY(110%);
            pointer-events: none;
        }
        /* In focus mode canvas doesn't scroll unless content overflows */
        body.focus-mode .canvas-wrapper {
            overflow: hidden;
        }
        body.focus-mode .canvas-wrapper.needs-scroll {
            overflow: auto;
        }

        /* ── FOCUS EXIT BUTTON ── */
        .focus-exit {
            position: fixed; top: 16px; right: 16px;
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300;
            opacity: 0; pointer-events: none;
            transform: scale(0.75);
            transition: opacity 0.25s, transform 0.25s, background 0.15s, color 0.15s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        body.focus-mode .focus-exit {
            pointer-events: all;
        }
        body.focus-mode .focus-exit.peek {
            opacity: 1; transform: scale(1);
        }
        .focus-exit:hover { background: var(--surface); color: var(--text); }

        /* invisible hit area in top-right corner to trigger peek */
        .focus-exit-zone {
            position: fixed; top: 0; right: 0;
            width: 80px; height: 80px;
            z-index: 299; pointer-events: none;
        }
        body.focus-mode .focus-exit-zone { pointer-events: all; }

        .header-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--flow); }

        /* ── DROPDOWN MENU ── */
        .menu-wrapper { position: relative; }

        .menu-trigger {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 14px; background: var(--card);
            color: var(--text-mid); border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif; font-size: 0.8rem;
            cursor: pointer; transition: all 0.15s; user-select: none;
        }
        .menu-trigger:hover { border-color: var(--text-muted); color: var(--text); }
        .menu-trigger.open { border-color: var(--flow); color: var(--flow); background: var(--flow-dim); }

        .menu-trigger svg { transition: transform 0.2s; }
        .menu-trigger.open svg { transform: rotate(180deg); }

        .dropdown {
            position: absolute; bottom: calc(100% + 8px); right: 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); min-width: 220px;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.25);
            z-index: 100; overflow: hidden;
            opacity: 0; transform: translateY(6px) scale(0.98);
            pointer-events: none;
            transition: opacity 0.15s, transform 0.15s;
        }
        .dropdown.open {
            opacity: 1; transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .drop-section {
            padding: 6px;
            border-bottom: 1px solid var(--border);
        }
        .drop-section:last-child { border-bottom: none; }

        .drop-label {
            font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-muted); padding: 6px 8px 4px;
            font-family: 'Inter', sans-serif; font-weight: 500;
        }

        .drop-btn {
            display: flex; align-items: center; gap: 9px;
            width: 100%; padding: 9px 10px;
            background: none; border: none; border-radius: var(--radius-sm);
            color: var(--text-mid); font-family: 'Inter', sans-serif;
            font-size: 0.82rem; cursor: pointer; transition: all 0.12s;
            text-align: left;
        }
        .drop-btn:hover { background: var(--card); color: var(--text); }
        .drop-btn.danger { color: var(--danger); }
        .drop-btn.danger:hover { background: rgba(224,82,82,0.1); }
        .drop-btn.export { color: var(--flow); }
        .drop-btn.export:hover { background: var(--flow-dim); }

        /* Theme picker inside dropdown */
        .drop-theme {
            display: flex; gap: 4px; padding: 4px 2px;
        }
        .tpick {
            flex: 1; padding: 7px 6px; border: 1px solid var(--border);
            background: var(--card); border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.70rem; letter-spacing: 0.03em; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s; white-space: nowrap; text-align: center;
        }
        .tpick:hover { color: var(--text); border-color: var(--text-muted); }
        .tpick.active {
            background: var(--flow-dim); border-color: var(--flow);
            color: var(--text); font-weight: 600;
        }
        .tpick[data-theme="miku"].active { color: #E3007F; border-color: #E3007F; background: rgba(227,0,127,0.1); }

        /* ── SYNC PANEL ── */
        .sync-panel {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(12px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); width: 340px; max-width: calc(100vw - 32px);
            box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
            z-index: 200; padding: 20px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.18s, transform 0.18s;
        }
        .sync-panel.open {
            opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0);
        }
        .sync-panel-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem; font-weight: 700; letter-spacing: -0.02em;
            color: var(--text); margin-bottom: 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .sync-close {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1.1rem; padding: 2px 4px;
            border-radius: 4px; transition: color 0.15s;
        }
        .sync-close:hover { color: var(--text); }
        .sync-field { margin-bottom: 12px; }
        .sync-label {
            display: block; font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 5px;
            font-family: 'Inter', sans-serif;
        }
        .sync-input {
            width: 100%; padding: 9px 11px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 0.82rem;
            outline: none; transition: border-color 0.15s;
        }
        .sync-input:focus { border-color: var(--flow); }
        .sync-input::placeholder { color: var(--text-muted); }
        .sync-row { display: flex; gap: 8px; margin-top: 16px; }
        .sync-btn {
            flex: 1; padding: 9px 12px; border-radius: var(--radius-sm);
            font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .sync-btn-save { background: var(--flow); color: var(--bg); border-color: var(--flow); }
        .sync-btn-save:hover { opacity: 0.85; }
        .sync-btn-load { background: var(--card); color: var(--text-mid); }
        .sync-btn-load:hover { color: var(--text); border-color: var(--text-muted); }
        .sync-status {
            margin-top: 12px; font-size: 0.75rem; font-family: 'Inter', sans-serif;
            color: var(--text-muted); text-align: center; min-height: 18px;
            transition: color 0.2s;
        }
        .sync-status.ok { color: #4caf7d; }
        .sync-status.err { color: var(--danger); }
        .sync-gist-id {
            margin-top: 10px; padding: 8px 11px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); font-size: 0.72rem;
            font-family: 'Inter', sans-serif; color: var(--text-muted);
            word-break: break-all; display: none;
        }
        .sync-gist-id a { color: var(--flow); text-decoration: none; }
        .sync-gist-id a:hover { text-decoration: underline; }

        /* ── PAGE TITLE ── */
        .page-title-bar {
            padding: 16px 28px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s, transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .page-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
            outline: none;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 3px 10px;
            min-width: 80px;
            max-width: 520px;
            text-align: center;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .page-title:focus {
            background: var(--flow-dim);
            border-color: var(--border-light);
            color: var(--text);
        }
        .page-title:empty:before {
            content: "Untitled";
            color: var(--text-muted);
            font-style: normal;
            font-weight: 400;
        }

        /* ── WORKSPACE & CANVAS ── */
        .workspace {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: transparent;
            transition: background-color 0.4s;
            min-height: 0;
        }

        /* Saat Mode Mobile Aktif, ubah background belakang agar HP lebih menonjol */
        .workspace.mobile-active {
            background-color: rgba(0,0,0,0.2);
            padding: 20px;
        }

        .canvas-wrapper {
            width: 100%;
            height: 100%;
            overflow: auto;
            position: relative;
            padding: 40px;
            background-color: var(--bg);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            scrollbar-width: none;
        }
        .canvas-wrapper::-webkit-scrollbar { display: none; }

        /* Tampilan Bingkai HP (Mobile Mode) */
        .canvas-wrapper.mobile-device {
            width: 390px;
            height: 800px;
            max-height: 100%;
            border-radius: 36px;
            border: 12px solid var(--border-light);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            padding: 20px;
        }

        #lines-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        #tree-container {
            position: relative; z-index: 2;
            display: inline-block; min-width: 100%; min-height: 100%;
        }

        /* ── NODES ── */
        .node {
            background-color: var(--card);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            border-left: 3px solid var(--flow);
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s; position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .node:hover { background-color: var(--surface); border-color: var(--border-light); }
        .node.root-node { border-left-color: var(--flow); font-weight: 600; }

        .node-text {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text); font-weight: 500; font-size: 0.88rem;
            min-width: 100px; max-width: 250px; outline: none;
            word-wrap: break-word; padding: 4px 6px; border-radius: 4px;
            border: 1px solid transparent; transition: background 0.15s, border-color 0.15s;
            letter-spacing: -0.02em;
        }
        .node-text:focus { background-color: var(--flow-dim); border-color: var(--border-light); }
        .node-text:empty:before { content: "Ketik di sini..."; color: var(--text-muted); font-style: italic; font-weight: 400; }

        .action-btns { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
        .node:hover .action-btns { opacity: 1; }
        
        /* Dukungan sentuh agar tombol selalu terlihat di HP asli/mobile mode sempit */
        .mobile-device .action-btns { opacity: 1; }

        .add-btn, .del-btn {
            background-color: transparent; border-radius: 50%;
            width: 22px; height: 22px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.18s;
        }
        .add-btn { color: var(--text-muted); border: 1.5px solid var(--border-light); }
        .add-btn:hover { border-color: var(--flow); color: var(--flow); background: var(--flow-dim); transform: scale(1.1); }

        .del-btn { color: var(--danger); border: 1.5px solid transparent; font-size: 16px; margin-left: -2px; }
        .del-btn:hover { border-color: var(--danger); background: rgba(224,82,82,0.14); transform: scale(1.1); }

        /* ── LAYOUT ── */
        .horizontal .node-group { display: flex; flex-direction: row; align-items: center; margin: 12px 0; }
        .horizontal .children { display: flex; flex-direction: column; padding-left: 60px; }
        .vertical .node-group { display: flex; flex-direction: column; align-items: center; margin: 0 12px; }
        .vertical .children { display: flex; flex-direction: row; padding-top: 60px; align-items: flex-start; }
    </style>
</head>
<body data-theme="dark">

    <div class="focus-exit-zone" id="focus-exit-zone"></div>
    <button class="focus-exit" onclick="toggleFullscreen()" title="Keluar Focus Mode" id="focus-exit-btn">✕</button>

    <div class="page-title-bar">
        <div class="page-title" contenteditable="true" spellcheck="false" id="page-title"></div>
    </div>

    <div class="workspace" id="workspace">
        <div class="canvas-wrapper" id="canvas-wrapper">
            <svg id="lines-svg"></svg>
            <div id="tree-container" class="horizontal">
                </div>
        </div>
    </div>

    <!-- Sync Panel -->
    <div class="sync-panel" id="sync-panel">
        <div class="sync-panel-title">
            ☁ GitHub Sync
            <button class="sync-close" onclick="closeSyncPanel()">✕</button>
        </div>
        <div class="sync-field">
            <label class="sync-label">Username GitHub</label>
            <input class="sync-input" id="sync-username" placeholder="contoh: johndoe" autocomplete="off">
        </div>
        <div class="sync-field">
            <label class="sync-label">Personal Access Token</label>
            <input class="sync-input" id="sync-token" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
        </div>
        <div class="sync-field">
            <label class="sync-label">Gist ID <span style="font-weight:400;text-transform:none;letter-spacing:0">(kosongkan untuk buat baru)</span></label>
            <input class="sync-input" id="sync-gist-id" placeholder="opsional" autocomplete="off">
        </div>
        <div class="sync-row">
            <button class="sync-btn sync-btn-load" onclick="loadFromGithub()">⬇ Load</button>
            <button class="sync-btn sync-btn-save" onclick="saveToGithub()">⬆ Save</button>
        </div>
        <div class="sync-status" id="sync-status"></div>
        <div class="sync-gist-id" id="sync-gist-link"></div>
    </div>

    <div class="toolbar">
        <div class="header-title">
            mind✦ryg
        </div>

        <span style="color: var(--border); font-size: 1.2rem; line-height:1;">|</span>

        <div class="menu-wrapper" id="menu-wrapper">
            <button class="menu-trigger" id="menu-trigger" onclick="toggleMenu()">
                ✦
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <div class="dropdown" id="main-dropdown">
                <div class="drop-section">
                    <div class="drop-label">Tema</div>
                    <div class="drop-theme">
                        <button class="tpick active" data-theme="dark" onclick="setTheme('dark')">dark</button>
                        <button class="tpick" data-theme="light" onclick="setTheme('light')">light</button>
                        <button class="tpick" data-theme="miku" onclick="setTheme('miku')">✦ miku</button>
                    </div>
                </div>
                <div class="drop-section">
                    <div class="drop-label">Tampilan</div>
                    <button class="drop-btn" onclick="toggleMobileView(); closeMenu()" id="btn-mobile">📱 Mode: Desktop</button>
                    <button class="drop-btn" onclick="toggleMode(); closeMenu()" id="mode-btn">⤢ Tata Letak</button>
                    <button class="drop-btn" onclick="toggleFullscreen(); closeMenu()" id="btn-fullscreen">
                        <span id="fs-label">⊡ Focus Mode</span>
                    </button>
                </div>
                <div class="drop-section">
                    <div class="drop-label">Ekspor</div>
                    <button class="drop-btn export" onclick="exportToPNG('landscape'); closeMenu()">📸 Save Landscape</button>
                    <button class="drop-btn export" onclick="exportToPNG('portrait'); closeMenu()">📸 Save Portrait</button>
                </div>
                <div class="drop-section">
                    <div class="drop-label">Sync</div>
                    <button class="drop-btn" onclick="toggleSyncPanel(); closeMenu()" id="btn-sync">☁ GitHub Sync</button>
                </div>
                <div class="drop-section">
                    <button class="drop-btn danger" onclick="clearCache(); closeMenu()">🗑 Hapus Cache</button>
                    <button class="drop-btn danger" onclick="resetTree(); closeMenu()">✕ Mulai Ulang</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'horizontal';
        let isMobileView = false;

        function toggleFullscreen() {
            const isFocus = document.body.classList.toggle('focus-mode');
            const label = document.getElementById('fs-label');
            if (label) label.textContent = isFocus ? '⊠ Keluar Focus' : '⊡ Focus Mode';
            closeSyncPanel();
            closeMenu();
            checkScrollNeeded();
            setTimeout(drawLines, 50);
        }

        function checkScrollNeeded() {
            const wrapper = document.getElementById('canvas-wrapper');
            const treeW = wrapper.scrollWidth;
            const treeH = wrapper.scrollHeight;
            const fits = treeW <= wrapper.clientWidth && treeH <= wrapper.clientHeight;
            wrapper.classList.toggle('needs-scroll', !fits);
        }

        // Also press Escape to exit focus mode
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.body.classList.contains('focus-mode')) {
                toggleFullscreen();
            }
        });

        function toggleMenu() {
            const trigger = document.getElementById('menu-trigger');
            const dropdown = document.getElementById('main-dropdown');
            trigger.classList.toggle('open');
            dropdown.classList.toggle('open');
        }

        function closeMenu() {
            document.getElementById('menu-trigger').classList.remove('open');
            document.getElementById('main-dropdown').classList.remove('open');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            const wrapper = document.getElementById('menu-wrapper');
            const syncPanel = document.getElementById('sync-panel');
            const syncBtn = document.getElementById('btn-sync');
            if (!wrapper.contains(e.target)) closeMenu();
            if (!syncPanel.contains(e.target) && !syncBtn.contains(e.target)) closeSyncPanel();
        });

        // ── SYNC PANEL ──
        function toggleSyncPanel() {
            const panel = document.getElementById('sync-panel');
            const btn = document.getElementById('btn-sync');
            const isOpen = panel.classList.contains('open');
            if (isOpen) { closeSyncPanel(); return; }
            // Load saved credentials
            document.getElementById('sync-username').value = localStorage.getItem('gh_username') || '';
            document.getElementById('sync-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('sync-gist-id').value = localStorage.getItem('gh_gist_id') || '';
            panel.classList.add('open');
            btn.classList.add('open');
            setStatus('', '');
        }

        function closeSyncPanel() {
            document.getElementById('sync-panel').classList.remove('open');
            document.getElementById('btn-sync').classList.remove('open');
        }

        function setStatus(msg, type) {
            const el = document.getElementById('sync-status');
            el.textContent = msg;
            el.className = 'sync-status' + (type ? ' ' + type : '');
        }

        function saveCredentials() {
            const username = document.getElementById('sync-username').value.trim();
            const token = document.getElementById('sync-token').value.trim();
            const gistId = document.getElementById('sync-gist-id').value.trim();
            if (username) localStorage.setItem('gh_username', username);
            if (token) localStorage.setItem('gh_token', token);
            if (gistId) localStorage.setItem('gh_gist_id', gistId);
            return { username, token, gistId };
        }

        // Serialize tree to JSON
        function serializeTree() {
            function serializeGroup(group) {
                const text = group.querySelector(':scope > .node > .node-text').innerText;
                const children = [];
                const childGroups = group.querySelectorAll(':scope > .children > .node-group');
                childGroups.forEach(cg => children.push(serializeGroup(cg)));
                return { text, children };
            }
            const root = document.querySelector('#tree-container > .node-group');
            return root ? serializeGroup(root) : null;
        }

        // Restore tree from JSON
        function deserializeTree(data) {
            function buildGroup(node, isRoot) {
                const del = isRoot ? '' : `<button class="del-btn" onclick="deleteNode(this)" title="Hapus">×</button>`;
                const html = `
                    <div class="node${isRoot ? ' root-node' : ''}">
                        <div class="node-text" contenteditable="true" oninput="drawLines()" onblur="drawLines()">${node.text}</div>
                        <div class="action-btns">
                            <button class="add-btn" onclick="addChild(this)" title="Tambah Cabang">+</button>
                            ${del}
                        </div>
                    </div>
                    <div class="children"></div>
                `;
                const group = document.createElement('div');
                group.className = 'node-group';
                group.innerHTML = html;
                const children = group.querySelector('.children');
                (node.children || []).forEach(c => children.appendChild(buildGroup(c, false)));
                return group;
            }
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            if (data) container.appendChild(buildGroup(data, true));
            setTimeout(drawLines, 50);
        }

        async function saveToGithub() {
            const { username, token, gistId } = saveCredentials();
            if (!token) { setStatus('Token tidak boleh kosong.', 'err'); return; }
            setStatus('Menyimpan...', '');
            const treeData = serializeTree();
            const content = JSON.stringify({ tree: treeData, savedAt: new Date().toISOString(), author: username }, null, 2);
            try {
                const body = { description: `mind✦ryg – ${username || 'sync'}`, public: false, files: { 'breakdown.json': { content } } };
                const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
                const method = gistId ? 'PATCH' : 'POST';
                const res = await fetch(url, { method, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'X-GitHub-Api-Version': '2022-11-28' }, body: JSON.stringify(body) });
                if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
                const data = await res.json();
                localStorage.setItem('gh_gist_id', data.id);
                document.getElementById('sync-gist-id').value = data.id;
                const linkEl = document.getElementById('sync-gist-link');
                linkEl.style.display = 'block';
                linkEl.innerHTML = `Gist ID: <a href="${data.html_url}" target="_blank">${data.id}</a>`;
                setStatus('✓ Tersimpan ke GitHub!', 'ok');
            } catch(e) {
                setStatus('✗ Gagal: ' + e.message, 'err');
            }
        }

        async function loadFromGithub() {
            const { token, gistId } = saveCredentials();
            if (!token) { setStatus('Token tidak boleh kosong.', 'err'); return; }
            if (!gistId) { setStatus('Gist ID diperlukan untuk load.', 'err'); return; }
            setStatus('Memuat...', '');
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `Bearer ${token}`, 'X-GitHub-Api-Version': '2022-11-28' } });
                if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
                const data = await res.json();
                const raw = data.files['breakdown.json']?.content;
                if (!raw) throw new Error('File breakdown.json tidak ditemukan di gist.');
                const parsed = JSON.parse(raw);
                deserializeTree(parsed.tree);
                const linkEl = document.getElementById('sync-gist-link');
                linkEl.style.display = 'block';
                linkEl.innerHTML = `Gist: <a href="${data.html_url}" target="_blank">${gistId}</a> · disimpan ${new Date(parsed.savedAt).toLocaleString('id-ID')}`;
                setStatus('✓ Berhasil dimuat!', 'ok');
            } catch(e) {
                setStatus('✗ Gagal: ' + e.message, 'err');
            }
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            document.querySelectorAll('.tpick').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === theme);
            });
            drawLines(); 
        }

        // Fungsi baru: Toggle Mode Mobile
        function toggleMobileView() {
            isMobileView = !isMobileView;
            const wrapper = document.getElementById('canvas-wrapper');
            const workspace = document.getElementById('workspace');
            const btn = document.getElementById('btn-mobile');

            if (isMobileView) {
                wrapper.classList.add('mobile-device');
                workspace.classList.add('mobile-active');
                btn.innerHTML = '💻 Mode: Mobile';
                // Jika masuk mode mobile, layout otomatis dibuat vertikal agar muat
                if(currentMode === 'horizontal') toggleMode();
            } else {
                wrapper.classList.remove('mobile-device');
                workspace.classList.remove('mobile-active');
                btn.innerHTML = '📱 Mode: Desktop';
            }
            
            // Beri jeda sedikit agar animasi CSS selesai sebelum menggambar ulang garis
            setTimeout(drawLines, 400); 
        }

        function init() {
            const tree = document.getElementById('tree-container');
            tree.innerHTML = `
                <div class="node-group">
                    <div class="node root-node">
                        <div class="node-text" contenteditable="true" oninput="drawLines()" onblur="drawLines()">Masalah Utama</div>
                        <div class="action-btns">
                            <button class="add-btn" onclick="addChild(this)" title="Tambah Cabang">+</button>
                        </div>
                    </div>
                    <div class="children"></div>
                </div>
            `;
            setTimeout(drawLines, 50);
        }

        function addChild(btnElement) {
            const group = btnElement.closest('.node-group');
            const childrenContainer = group.querySelector(':scope > .children');

            const newGroup = document.createElement('div');
            newGroup.className = 'node-group';
            newGroup.innerHTML = `
                <div class="node">
                    <div class="node-text" contenteditable="true" oninput="drawLines()" onblur="drawLines()"></div>
                    <div class="action-btns">
                        <button class="add-btn" onclick="addChild(this)" title="Tambah Cabang">+</button>
                        <button class="del-btn" onclick="deleteNode(this)" title="Hapus Cabang Ini & Turunannya">×</button>
                    </div>
                </div>
                <div class="children"></div>
            `;
            
            childrenContainer.appendChild(newGroup);
            drawLines();

            const newTextElement = newGroup.querySelector('.node-text');
            newTextElement.focus();
        }

        function deleteNode(btnElement) {
            if(confirm("Apakah kamu yakin ingin menghapus cabang ini beserta semua anak/turunannya?")) {
                const group = btnElement.closest('.node-group');
                group.remove();
                drawLines();
            }
        }

        function toggleMode() {
            const tree = document.getElementById('tree-container');
            if (currentMode === 'horizontal') {
                currentMode = 'vertical';
                tree.className = 'vertical';
            } else {
                currentMode = 'horizontal';
                tree.className = 'horizontal';
            }
            drawLines();
        }

        function clearCache() {
            if (confirm("Hapus semua cache? (kredensial GitHub Sync akan ikut terhapus)")) {
                localStorage.clear();
                alert("Cache berhasil dihapus.");
            }
        }

        function resetTree() {
            if(confirm("Yakin ingin menghapus semua dan memulai ulang?")) {
                init();
            }
        }

        async function exportToPNG(orientation) {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Render...";

            try {
                const wrapper = document.getElementById('canvas-wrapper');
                
                // Matikan sementara transisi CSS agar tangkapan layar tidak patah
                wrapper.style.transition = 'none';

                const sw = window.screen.width;
                const sh = window.screen.height;
                
                let targetW = orientation === 'landscape' ? Math.max(sw, sh) : Math.min(sw, sh);
                let targetH = orientation === 'landscape' ? Math.min(sw, sh) : Math.max(sw, sh);

                // Jika sedang dalam Mode Mobile, ekspor seluruh frame mobilenya memanjang ke bawah
                if(isMobileView) {
                    targetW = wrapper.scrollWidth + 40;
                    targetH = wrapper.scrollHeight + 40;
                }

                const contentW = wrapper.scrollWidth;
                const contentH = wrapper.scrollHeight;
                const exportW = Math.max(targetW, contentW + 50);
                const exportH = Math.max(targetH, contentH + 50);

                const originalStyle = wrapper.getAttribute('style') || '';
                wrapper.style.width = exportW + 'px';
                wrapper.style.height = exportH + 'px';
                wrapper.style.overflow = 'visible'; 
                wrapper.style.flexGrow = '0';
                
                drawLines(); 
                
                const canvas = await html2canvas(wrapper, {
                    width: exportW,
                    height: exportH,
                    backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg'),
                    scale: 1.5
                });

                wrapper.setAttribute('style', originalStyle);
                drawLines();

                const link = document.createElement('a');
                // Beri nama beda jika ekspornya dari tampilan mobile
                const fileNameSuffix = isMobileView ? "Mobile" : orientation;
                link.download = `Breakdown_${fileNameSuffix}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

            } catch (e) {
                console.error("Export error: ", e);
                alert("Terjadi kesalahan saat mengekspor gambar.");
            } finally {
                btn.innerHTML = originalText;
            }
        }

        function drawLines() {
            const svg = document.getElementById('lines-svg');
            const wrapper = document.getElementById('canvas-wrapper');
            
            svg.style.width = Math.max(wrapper.scrollWidth, wrapper.clientWidth) + 'px';
            svg.style.height = Math.max(wrapper.scrollHeight, wrapper.clientHeight) + 'px';
            svg.innerHTML = ''; 

            const wrapperRect = wrapper.getBoundingClientRect();
            const scrollLeft = wrapper.scrollLeft;
            const scrollTop = wrapper.scrollTop;

            const nodeGroups = document.querySelectorAll('.node-group');
            const strokeColor = getComputedStyle(document.body).getPropertyValue('--border-light').trim();

            nodeGroups.forEach(group => {
                const parentNode = group.querySelector(':scope > .node');
                const childrenContainer = group.querySelector(':scope > .children');
                
                if (!childrenContainer) return;
                
                const childrenNodes = childrenContainer.querySelectorAll(':scope > .node-group > .node');
                if (childrenNodes.length === 0) return;

                const pRect = parentNode.getBoundingClientRect();
                
                childrenNodes.forEach(child => {
                    const cRect = child.getBoundingClientRect();
                    let pathD = '';

                    if (currentMode === 'horizontal') {
                        const startX = (pRect.right - wrapperRect.left) + scrollLeft;
                        const startY = (pRect.top + pRect.height / 2 - wrapperRect.top) + scrollTop;
                        
                        const endX = (cRect.left - wrapperRect.left) + scrollLeft;
                        const endY = (cRect.top + cRect.height / 2 - wrapperRect.top) + scrollTop;
                        const midX = startX + (endX - startX) / 2;
                        
                        pathD = `M ${startX} ${startY} L ${midX} ${startY} L ${midX} ${endY} L ${endX} ${endY}`;
                    } else {
                        const startX = (pRect.left + pRect.width / 2 - wrapperRect.left) + scrollLeft;
                        const startY = (pRect.bottom - wrapperRect.top) + scrollTop;
                        
                        const endX = (cRect.left + cRect.width / 2 - wrapperRect.left) + scrollLeft;
                        const endY = (cRect.top - wrapperRect.top) + scrollTop;
                        const midY = startY + (endY - startY) / 2;
                        
                        pathD = `M ${startX} ${startY} L ${startX} ${midY} L ${endX} ${midY} L ${endX} ${endY}`;
                    }

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', pathD);
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke', strokeColor);
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('stroke-linejoin', 'miter'); 
                    
                    svg.appendChild(path);
                });
            });
            if (document.body.classList.contains('focus-mode')) checkScrollNeeded();
        }

        // Peek logic for focus exit button
        const exitZone = document.getElementById('focus-exit-zone');
        const exitBtn  = document.getElementById('focus-exit-btn');
        function showPeek() { exitBtn.classList.add('peek'); }
        function hidePeek() { exitBtn.classList.remove('peek'); }
        exitZone.addEventListener('mouseenter', showPeek);
        exitZone.addEventListener('mouseleave', hidePeek);
        exitBtn.addEventListener('mouseenter', showPeek);
        exitBtn.addEventListener('mouseleave', hidePeek);
        document.getElementById('canvas-wrapper').addEventListener('scroll', drawLines);
        window.onload = init;
    </script>
